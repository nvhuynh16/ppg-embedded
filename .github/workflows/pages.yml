name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # Privacy guard: never deploy if any path matching `application*` made
      # it into the working tree somehow. Belt-and-braces with .gitignore.
      - name: Privacy audit
        run: |
          if find . -iname '*application*' -not -path './.git/*' | grep -q .; then
            echo "::error::Privacy audit FAILED: application* path present"
            find . -iname '*application*' -not -path './.git/*'
            exit 1
          fi

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact (docs/ directory)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
